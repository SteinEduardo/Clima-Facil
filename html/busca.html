<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Clima Fácil - Busca Avançada</title>
</head>

<body>
    <div id="sidebar"></div>

    <div class="container">
        <header>
            <h2>Painel central</h2>
            <h3>Loacalização atual</h3>
            <h3>Data</h3>
        </header>

        <main class="dashboard">
            <section>
                <input type="text" placeholder="Pesquisar cidade">
                <button type="button">Buscar</button>
            </section>

            <section>
                <article>
                    <h2 id="cidade-atual"></h2>
                    <div class="clima-info">
                    <span id="temperatura-atual"></span>

                    <p>
                        Vento: <span id="vento-atual"></span>
                    </p>

                    <p>
                        Umidade: <span id="umidade-atual"></span>
                    </p>
                    </div>
                </article>

                <div class="card-acoes">
                    <button type="button">
                        Favoritar
                    </button>
                    <a href="previsao.html">
                        Previsão próximos 5 dias
                    </a>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
    <script src="../js/busca.js"></script>
</body>

</html>
