<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Clima Fácil - Busca Avançada</title>
</head>

<body>
    <div id="sidebar"></div>

    <div class="container">
        <header>
            <h2>Painel central</h2>
            <h3>Loacalização atual</h3>
            <h3>Data</h3>
        </header>

        <main class="dashboard">
            <section class="busca-container">
                <div class="barra-busca">
                    <input type="text" placeholder="Pesquisar cidade">
                    <button type="button">Buscar</button>
                </div>

                <div class="lista-cidades"></div>
            </section>

            <section class="card-principal">
                <article class="card-cidade">
                    <h2 id="cidade-atual"></h2>
                    <div class="clima-info">
                        <p id="temperatura-atual"></p>
                        <div class="clima-detalhes">
                            <p id="descricao-clima"></p>
                            <p>
                                Vento: <span id="vento-atual"></span>
                            </p>

                            <p>
                                Umidade: <span id="umidade-atual"></span>
                            </p>
                        </div>
                    </div>
                </article>

                <div class="card-acoes">
                    <button id="btn-cidade-padrao">Tornar padrão</button>
                    <button type="button" id="btn-favoritar">Favoritar</button>
                    <a href="previsao.html">Previsão próximos 5 dias</a>
                </div>
            </section>

            <section>
                <div class="previsao-5dias"></div>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
    <script src="../js/configuracoes.js"></script>
    <script src="../js/busca.js"></script>
    <script src="../js/favoritar.js"></script>
</body>

</html>
