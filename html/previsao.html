<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Clima Fácil - Previsao de 5 dias</title>
</head>

<body>
    <div id="sidebar"></div>

    <div class="container">
        <header>
            <h2>Previsao de 5 dias</h2>
            <h3>Loacalização atual</h3>
            <h3>Data</h3>
        </header>

        <main class="dashboard">
            <section class="card-principal">

                <article id="card-cidade">
                    <h2 id="cidade-atual"></h2>
                    <div class="clima-info">
                        <p id="temperatura-atual"></p>
                        <div class="clima-detalhes">
                            <p id="descricao-clima"></p>
                            <p>
                                Vento: <span id="vento-atual"></span>
                            </p>

                            <p>
                                Umidade: <span id="umidade-atual"></span>
                            </p>
                        </div>
                    </div>
                </article>

                <div class="previsao-5dias"></div>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
</body>

</html>
