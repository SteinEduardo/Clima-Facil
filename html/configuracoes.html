<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Configurações - Clima facil</title>
</head>

<body>
    <div id="sidebar"></div>

    <div class="container">
        <header>
            <h2>Configurações</h2>
            <h3 id="localizacao-atual">Localização atual: </h3>
            <h3 id="data-atual">Data: </h3>
        </header>

        <main class="dashboard">
            <section class="configuracoes">
                <article>
                    <h3>Cidade padrão</h3>
                    <div class="busca-cidade-padrao">
                        <input id="cidade-padrao" type="text" placeholder="Curitiba">
                        <button id="btn-buscar-cidade-padrao" type="button">
                            Buscar
                        </button>
                    </div>

                    <div class="lista-cidade-padrao"></div>
                </article>

                <article>
                    <h3>Unidade de temperatura</h3>
                    <select id="unidade-temperatura">
                        <option value="c">Celsius (°C)</option>
                        <option value="f">Fahrenheit (°F)</option>
                    </select>
                </article>

                <div class="botoes-configuracoes">
                    <button id="btn-salvar">Salvar configurações</button>
                    <button id="btn-voltar-padrao">Configurações padrão</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/configuracoes.js"></script>
</body>
</html>
