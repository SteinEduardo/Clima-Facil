<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Clima Facil - Painel Central</title>
</head>

<body>
    <div id="sidebar"></div>

    <div class="container">
        <header>
            <h2>Painel central</h2>
            <h3 id="localizacao-atual">Localização atual: </h3>
            <h3 id="data-atual">Data: </h3>
        </header>

        <main class="dashboard">
            <!--CARD PRINCIPAL-->
            <section class="card-principal">

                <!--CONTEUDO PRINCIPAL-->
                <article id="card-cidade">
                    <h2 id="cidade-atual"></h2>
                    <div class="clima-info">
                        <p id="temperatura-atual"></p>
                        <div class="clima-detalhes">
                            <p id="descricao-clima"></p>

                            <p>
                                Vento: <span id="vento-atual"></span>
                            </p>
                            
                            <p>
                                Umidade: <span id="umidade-atual"></span>
                            </p>
                        </div>
                    </div>
                </article>
                <!--FIM CONTEUDO PRINCIPAL-->

                <article>
                    
                </article>

                <!--INTERATIVIDADE CARD-->
                <div class="card-acoes">
                    <a href="previsao.html"> Previsão próximos 5 dias</a>
                </div>
                <!--FIM INTERATIVIDADE CARD-->

            </section>
            <!--FIM CARD PRINCIPAL-->

            <section class="card-resumo">
                <div id="previsao-horaria"></div>
            </section>

            <section>
                <iframe id="mapa-cidade"></iframe>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
    <script src="../js/header.js"></script>
</body>

</html>
