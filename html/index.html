<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Facil - Painel Central</title>
</head>

<body>
    <header>
        <h2>Painel central</h2>
        <h3>Loacalização atual</h3>
        <h3>Data</h3>
    </header>

    <div id="sidebar"></div>

    <main class="dashboard">
        <!--CARD PRINCIPAL-->
        <section class="card-principal">

            <!--CONTEUDO PRINCIPAL-->
            <article id="card-cidade">
                <h2 id="cidade-atual"></h2>
                <div class="clima-info">
                    <p id="temperatura-atual"></p>
                    <div class="clima-detalhes">
                        <p id="descricao-clima"></p>
                        <p>
                            Vento:
                            <span id="vento-atual"></span>
                        </p>
                        <p>
                            Umidade:
                            <span id="umidade-atual"></span>
                        </p>
                    </div>
                </div>
            </article>
            <!--FIM CONTEUDO PRINCIPAL-->

            <!--INTERATIVIDADE CARD-->
            <div class="card-acoes">
                <button type="button">
                    Favoritar
                </button>
                <a href="previsao.html">
                    Previsão próximos 5 dias
                </a>
            </div>
            <!--FIM INTERATIVIDADE CARD-->

        </section>
        <!--FIM CARD PRINCIPAL-->

        <section class="card-resumo">
            <article>ALERTAS</article>
            <article>PREVISÃO PROXIMA HORA</article>
            <article>RESUMO</article>
        </section>

        <section>
            <iframe src="https://www.google.com/maps?q=Curitiba,PR&output=embed"></iframe>
        </section>
    </main>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
</body>

</html>
