<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Comparar Cidades - Clima Facil</title>
</head>
<body>
    <div id="sidebar"></div>

    <div class="container">
        <header>
            <h2>Comparar Cidades</h2>
            <h3>Localização atual</h3>
            <h3>Data</h3>
        </header>

        <main class="dashboard">

            <section class="comparar-cidades">
                <article>
                    <h3>Comparador entre cidades</h3>
                    <div>
                        <p>Cidade A</p>
                        <input id="input-cidade-a" type="text" placeholder="Insira a cidade A">
                    </div>

                    <div>
                        <p>Cidade B</p>
                        <input id="input-cidade-b" type="text" placeholder="Insira a cidade B">
                    </div>
                    
                    <button id="btn-comparar" type="button">Comparar</button>
                </article>

                <article class="resultado-comparacao">
                    <div class="card-comparacao">
                        <h3 id="nome-cidade-a">Cidade A</h3>
                        <p>Temperatura: <span id="temperatura-cidade-a"></span></p>
                        <p>Vento: <span id="vento-cidade-a"></span></p>
                        <p>Umidade: <span id="umidade-cidade-a"></span></p>
                    </div>

                    <div class="card-comparacao">
                        <h3 id="nome-cidade-b">Cidade B</h3>
                        <p>Temperatura: <span id="temperatura-cidade-b"></span></p>
                        <p>Vento: <span id="vento-cidade-b"></span></p>
                        <p>Umidade: <span id="umidade-cidade-b"></span></p>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/clima.js"></script>
    <script src="../js/comparar.js"></script>
</body>
</body>
</html>
